name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run Ruff
        run: |
          python -m ruff check src tests examples benchmarks
          python -m ruff format --check src tests examples benchmarks

      - name: Run mypy
        run: python -m mypy src

      - name: Run tests with coverage
        run: python -m pytest --cov=sufficiency --cov-report=term-missing

  test-matrix:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run test suite
        run: python -m pytest -v --tb=short

  wheel-smoke:
    name: Wheel Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip wheel --no-deps . -w dist

      - name: Verify packaged DES schema is present in wheel
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheel_path = next(pathlib.Path('dist').glob('*.whl'))
          with zipfile.ZipFile(wheel_path) as archive:
              names = set(archive.namelist())

          expected = 'sufficiency/adapters/schemas/decision-event.schema.json'
          if expected not in names:
              raise SystemExit(f'Missing packaged schema in wheel: {expected}')
          PY

      - name: Install wheel into clean environment
        run: |
          python -m venv /tmp/esc-wheel-venv
          /tmp/esc-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/esc-wheel-venv/bin/python -m pip install dist/*.whl 'jsonschema>=4.20,<5'

      - name: Run wheel smoke test
        run: |
          /tmp/esc-wheel-venv/bin/python - <<'PY'
          from importlib.resources import files

          from sufficiency import compute_sufficiency, default_config
          from sufficiency.adapters.des import validate_events
          from sufficiency.types import DimensionScore

          schema_resource = files('sufficiency.adapters').joinpath(
              'schemas',
              'decision-event.schema.json',
          )
          assert schema_resource.is_file()

          event = {
              'schema_version': '0.3.0',
              'decision_id': 'smoke-test-event',
              'timestamp': '2026-01-01T00:00:00Z',
              'decision_type': 'automated',
              'decision_context': {
                  'decision_id': 'smoke-test-event',
                  'decision_type': 'fraud_detection',
              },
              'decision_logic': {
                  'logic_type': 'rule_based',
                  'output': 'approve',
              },
              'human_override_record': {
                  'override_occurred': False,
              },
              'temporal_metadata': {
                  'event_timestamp': '2026-01-01T00:00:00Z',
                  'decision_timestamp': '2026-01-01T00:00:00Z',
                  'sequence_number': 1,
                  'hash_chain': {
                      'previous_hash': None,
                      'current_hash': 'smoke-test-event-hash',
                      'algorithm': 'SHA-256',
                  },
                  'evidence_tier': 'lightweight',
              },
          }
          assert validate_events([event]) == []

          dimensions = {
              'completeness': DimensionScore(0.9, 0.9, 0.9, 'completeness'),
              'freshness': DimensionScore(0.8, 0.8, 0.8, 'freshness'),
              'reliability': DimensionScore(0.85, 0.85, 0.85, 'reliability'),
              'representativeness': DimensionScore(0.95, 0.95, 0.95, 'representativeness'),
          }
          result = compute_sufficiency(dimensions, default_config())
          assert 0.0 <= result.composite <= 1.0
          PY
